name: Develop CI/CD

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
        
    - name: Create environment variable
      run: echo "BASE_URL=${{ secrets.BASE_URL }}" > local.properties
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        
    - name: Send APK to Telegram
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "New build!"
        document: app/build/outputs/apk/debug/*.apk

  deploy-backend:
    runs-on: [self-hosted, k3s-runner]
    needs: build-android 
    
    steps:
    - uses: actions/checkout@v4

    - name: Build and Import Image to K3s
      run: |
        IMAGE_TAG="k3s-api-server:${{ github.sha }}"
        docker build -t $IMAGE_TAG .
        docker save $IMAGE_TAG | sudo k3s ctr -n k8s.io images import -
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Update K3s Deployment
      run: |
        kubectl set image deployment/python-api-deployment api-container=k3s-api-server:${{ github.sha }}
        kubectl rollout status deployment/python-api-deployment

    - name: Notify Backend Status
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "API updated!"
